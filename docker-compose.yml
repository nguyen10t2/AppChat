version: "3.8"

services:
  # Cơ Sở Dữ Liệu PostgreSQL Container
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appchat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secretpassword}
      POSTGRES_DB: ${POSTGRES_DB:-appchat}
    ports:
      # Chặn truy cập DB từ bên ngoài, chỉ cho phép từ chính server
      - "127.0.0.1:5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appchat"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache Container
  redis:
    image: redis:7-alpine
    ports:
      # Redis cũng chỉ nên lắng nghe nội bộ
      - "127.0.0.1:6379:6379"
    volumes:
      - ./redisdata:/data
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      # Ép backend chỉ nhận request từ Nginx (localhost)
      - "127.0.0.1:8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-appchat}:${POSTGRES_PASSWORD:-secretpassword}@db:5432/${POSTGRES_DB:-appchat}
      - REDIS_URL=redis://redis:6379
      - IP=0.0.0.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      # Ép frontend chỉ nhận request từ Nginx (localhost)
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    restart: unless-stopped